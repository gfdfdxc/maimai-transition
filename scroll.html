<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>舞萌 Festival 转场复刻 - 滚动驱动</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --t0:         0.17s;
    --dur-chip:   0.62s;
    --dur-base:   0.80s;
    --dur-purple: 0.70s;
    --dur-white:  0.68s;
    --dur-bg:     0.75s;

    --t-exit-chip:   1.62s;
    --t-exit-base:   1.746s;
    --t-exit-bg:     1.746s;
    --dur-exit-chip:   0.42s;
    --dur-exit-base:   0.70s;
    --dur-exit-purple: 0.70s;
    --dur-exit-white:  0.68s;
    --dur-exit-bg:     0.294s;
  }

  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #0e0e12;
    overflow-x: hidden;
    overflow-y: auto;
    font-family: 'Noto Sans SC', system-ui, sans-serif;
  }

  /* ========== 滚动空间：5 屏 ========== */
  .scroll-space {
    height: 500vh;
    position: relative;
    z-index: 1;
    pointer-events: none;
  }

  /* ========== 内容页（固定定位，随滚动显隐） ========== */
  .content-page {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 3;
    pointer-events: none;
  }

  .content-page .page-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.35s ease;
  }

  .project-link {
    position: absolute;
    bottom: 24px;
    font-size: 0.85rem;
    color: rgba(58, 26, 0, 0.6);
    text-decoration: none;
    transition: color 0.2s;
    pointer-events: auto;
  }
  .project-link:hover {
    color: rgba(58, 26, 0, 0.9);
    text-decoration: underline;
  }

  .content-page p {
    font-size: clamp(1.1rem, 2.8vw, 2rem);
    font-weight: 500;
    letter-spacing: 0.04em;
    text-align: center;
    margin: 0 2rem 2rem;
    line-height: 1.7;
  }

  .content-page img {
    max-width: min(280px, 55vw);
    max-height: 40vh;
    object-fit: contain;
    border-radius: 16px;
    filter: drop-shadow(0 8px 32px rgba(0,0,0,.45));
  }

  /* --- 第一页（滚动前） --- */
  #page-before {
    background: linear-gradient(160deg, #1a2a6c 0%, #2d5aa0 35%, #4a90d9 70%, #7ec8e3 100%);
    color: #e0f0ff;
  }
  #page-before p {
    text-shadow: 0 2px 20px rgba(100,180,255,.4);
  }
  #page-before img {
    animation: float-sad 3.5s ease-in-out infinite;
  }

  @keyframes float-sad {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-12px); }
  }

  /* --- 第二页（滚动后） --- */
  #page-after {
    background: linear-gradient(160deg, #b85c1e 0%, #e08a3a 35%, #f0b060 70%, #f7d794 100%);
    color: #3a1a00;
  }
  #page-after p {
    text-shadow: 0 2px 20px rgba(200,120,30,.35);
  }
  #page-after img {
    animation: float-happy 3s ease-in-out infinite;
  }

  @keyframes float-happy {
    0%, 100% { transform: translateY(0) scale(1); }
    50%      { transform: translateY(-10px) scale(1.03); }
  }

  /* ========== 16:9 居中舞台（固定在视口内） ========== */
  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  .stage.visible {
    opacity: 1;
  }
  .stage > .frame {
    aspect-ratio: 16 / 9;
    width: max(100vw, calc(100vh * 16 / 9));
    height: max(100vh, calc(100vw * 9 / 16));
    background: transparent;
    overflow: hidden;
    position: relative;
  }
  .stage svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* 暂停所有 CSS 动画，由 JS 按滚动位置驱动时间轴 */
  body.scroll-driven #frame svg * {
    animation-play-state: paused !important;
  }

  /* 滚动提示 */
  .scroll-hint {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    color: rgba(255,255,255,.7);
    font: 14px/1 'Noto Sans SC', system-ui, sans-serif;
    text-align: center;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .scroll-hint.hidden {
    opacity: 0;
  }
  .scroll-hint .arrow {
    display: block;
    margin: 8px auto 0;
    width: 24px;
    height: 24px;
    border-right: 2px solid rgba(255,255,255,.6);
    border-bottom: 2px solid rgba(255,255,255,.6);
    transform: rotate(45deg);
    animation: bounce-down 1.2s ease-in-out infinite;
  }
  @keyframes bounce-down {
    0%, 100% { transform: rotate(45deg) translateY(0); }
    50%      { transform: rotate(45deg) translateY(8px); }
  }

  /* ===== 动画关键帧 ===== */

  /* 滴拉熊入场：v41 恢复 v33含旋转 (-180°→0° CCW) + 缩放，透明度 0→1 */
  @keyframes chip-in {
    0%   { transform: rotate(-180deg) scale(4.50); opacity: 0;    }
    5%   { transform: rotate(-170deg) scale(4.30); opacity: 0.55; }
    18%  { transform: rotate(-140deg) scale(3.60); opacity: 0.85; }
    32%  { transform: rotate(-100deg) scale(2.50); opacity: 0.95; }
    48%  { transform: rotate(-55deg)  scale(1.40); opacity: 1;    }
    62%  { transform: rotate(-22deg)  scale(0.96); opacity: 1;    }
    74%  { transform: rotate(-8deg)   scale(0.91); opacity: 1;    }
    86%  { transform: rotate(-2deg)   scale(0.97); opacity: 1;    }
    94%  { transform: rotate(0deg)    scale(1.015);opacity: 1;    }
    100% { transform: rotate(0deg)    scale(1.00); opacity: 1;    }
  }

  /* === 底板：纯单调缓出，不提前锁定位置。 === */
  @keyframes settle-TL {
    0%   { transform: translate(-2400px, -1500px); }
    100% { transform: translate(0, 0); }
  }
  @keyframes settle-BR {
    0%   { transform: translate(2400px, 1500px); }
    100% { transform: translate(0, 0); }
  }

  /* === 两角三角（淡紫 / 白色） === */
  @keyframes converge-TL {
    0%   { transform: translate(1920px,1080px) scale(1.06) translate(-1920px,-1080px) translate(-2400px, -1500px); animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1); }
    65%  { transform: translate(1920px,1080px) scale(1.06) translate(-1920px,-1080px) translate(100px, 60px);     animation-timing-function: cubic-bezier(0.4, 0, 0.6, 1); }
    85%  { transform: translate(1920px,1080px) scale(1.06) translate(-1920px,-1080px) translate(-25px, -15px);    animation-timing-function: cubic-bezier(0.4, 0, 0.6, 1); }
    100% { transform: translate(1920px,1080px) scale(1.06) translate(-1920px,-1080px) translate(0, 0); }
  }
  @keyframes converge-BR {
    0%   { transform: translate(1920px,1080px) scale(1.06) translate(-1920px,-1080px) translate(2400px, 1500px);  animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1); }
    65%  { transform: translate(1920px,1080px) scale(1.06) translate(-1920px,-1080px) translate(-100px, -60px);   animation-timing-function: cubic-bezier(0.4, 0, 0.6, 1); }
    85%  { transform: translate(1920px,1080px) scale(1.06) translate(-1920px,-1080px) translate(25px, 15px);      animation-timing-function: cubic-bezier(0.4, 0, 0.6, 1); }
    100% { transform: translate(1920px,1080px) scale(1.06) translate(-1920px,-1080px) translate(0, 0); }
  }

  /* HOLD：从右上方滑向左下方（v45: 45° 对角） */
  @keyframes slide-TR-to-BL {
    0%   { transform: translate(2400px, -2400px); opacity: 0; }
    18%  { opacity: 1; }
    100% { transform: translate(0, 0); opacity: 1; }
  }
  /* SLIDE：从左下方滑向右上方（v45: 45° 对角） */
  @keyframes slide-BL-to-TR {
    0%   { transform: translate(-2400px, 2400px); opacity: 0; }
    18%  { opacity: 1; }
    100% { transform: translate(0, 0); opacity: 1; }
  }

  /* ============================================================
     出场动画：基本是入场的"逆向"，但 HOLD/SLIDE 维持入场方向继续飞出。
     ============================================================ */

  /* 滴拉熊出场：先微内收再外放淡出（无旋转） */
  @keyframes chip-out {
    0%   { transform: scale(1.00); opacity: 1;    }
    30%  { transform: scale(0.82); opacity: 1;    }
    50%  { transform: scale(2.20); opacity: 0.65; }
    70%  { transform: scale(3.40); opacity: 0.30; }
    85%  { transform: scale(4.20); opacity: 0.05; }
    100% { transform: scale(4.60); opacity: 0;    }
  }

  /* v43: 背景层父组同步 chip-out 缩放节奏 */
  @keyframes bg-out {
    0%   { transform: scale(1.00); opacity: 1;    }
    30%  { transform: scale(0.94); opacity: 1;    }
    55%  { transform: scale(1.90); opacity: 1;    }
    75%  { transform: scale(2.90); opacity: 0.55; }
    90%  { transform: scale(3.70); opacity: 0.15; }
    100% { transform: scale(4.20); opacity: 0;    }
  }

  /* v44: 底板只参与放大阶段（在 chip 30%收缩结束后才启动） */
  @keyframes bg-out-expand {
    0%   { transform: scale(1.00); opacity: 1;    }
    35%  { transform: scale(1.90); opacity: 1;    }
    65%  { transform: scale(2.90); opacity: 0.55; }
    85%  { transform: scale(3.70); opacity: 0.15; }
    100% { transform: scale(4.20); opacity: 0;    }
  }

  /* v46: 底板子层出场 = 入场逆向，分别飞向左上 / 右下角外 */
  @keyframes expand-TL  {
    0%   { transform: translate(0, 0);              opacity: 1;    }
    70%  { transform: translate(-1680px,-1050px);    opacity: 0.55; }
    100% { transform: translate(-2400px,-1500px);    opacity: 0;    }
  }
  @keyframes expand-BR  {
    0%   { transform: translate(0, 0);              opacity: 1;    }
    70%  { transform: translate( 1680px, 1050px);    opacity: 0.55; }
    100% { transform: translate( 2400px, 1500px);    opacity: 0;    }
  }
  /* 两角淡紫/白色出场：先向中心回弹，再向角外飞出（与入场节奏一致） */
  @keyframes converge-TL-out {
    0%   { transform: translate(1920px,1080px) scale(1.06) translate(-1920px,-1080px) translate(0, 0); }
    20%  { transform: translate(1920px,1080px) scale(1.06) translate(-1920px,-1080px) translate(100px, 60px); }
    35%  { transform: translate(1920px,1080px) scale(1.06) translate(-1920px,-1080px) translate(-25px, -15px); }
    100% { transform: translate(1920px,1080px) scale(1.06) translate(-1920px,-1080px) translate(-2400px, -1500px); }
  }
  @keyframes converge-BR-out {
    0%   { transform: translate(1920px,1080px) scale(1.06) translate(-1920px,-1080px) translate(0, 0); }
    20%  { transform: translate(1920px,1080px) scale(1.06) translate(-1920px,-1080px) translate(-100px, -60px); }
    35%  { transform: translate(1920px,1080px) scale(1.06) translate(-1920px,-1080px) translate(25px, 15px); }
    100% { transform: translate(1920px,1080px) scale(1.06) translate(-1920px,-1080px) translate(2400px, 1500px); }
  }

  /* HOLD：继续向左下方向飞出（v29: 45° 对角，与 slide 条本身方向一致） */
  @keyframes slide-TR-to-BL-out {
    from { transform: translate(0, 0);                opacity: 1; }
    to   { transform: translate(-2200px, 2200px);     opacity: 0; }
  }
  /* SLIDE：继续向右上方向飞出（v29: 45° 对角，修复“偏右”） */
  @keyframes slide-BL-to-TR-out {
    from { transform: translate(0, 0);                opacity: 1; }
    to   { transform: translate( 2200px,-2200px);     opacity: 0; }
  }

  /* ===== 应用到 SVG 图层（按 ID） ===== */
  #滴拉熊 {
    transform-box: view-box;
    transform-origin: 50% 50%;
    animation-name:            chip-in,                                chip-out;
    animation-duration:        var(--dur-chip),                         var(--dur-exit-chip);
    animation-timing-function: linear,                                  linear;
    animation-delay:           calc(var(--t0) - 0.02s),                 var(--t-exit-chip);
    animation-fill-mode:       both,                                    forwards;
  }

  #左上小方块, #左上底板 {
    animation-name:            settle-TL,                               expand-TL;
    animation-duration:        var(--dur-base),                         var(--dur-exit-base);
    animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1),          linear;
    animation-delay:           var(--t0),                               var(--t-exit-base);
    animation-fill-mode:       both,                                    forwards;
  }
  #右下小方块, #右下底板 {
    animation-name:            settle-BR,                               expand-BR;
    animation-duration:        var(--dur-base),                         var(--dur-exit-base);
    animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1),          linear;
    animation-delay:           var(--t0),                               var(--t-exit-base);
    animation-fill-mode:       both,                                    forwards;
  }

  /* 两角淡紫 */
  #两角淡紫 > [id="左上"] {
    animation-name:            converge-TL,                             converge-TL-out;
    animation-duration:        var(--dur-purple),                       var(--dur-exit-purple);
    animation-timing-function: linear,                                  linear;
    animation-delay:           var(--t0),                               var(--t-exit-base);
    animation-fill-mode:       both,                                    forwards;
  }
  #两角淡紫 > [id="右下"] {
    animation-name:            converge-BR,                             converge-BR-out;
    animation-duration:        var(--dur-purple),                       var(--dur-exit-purple);
    animation-timing-function: linear,                                  linear;
    animation-delay:           var(--t0),                               var(--t-exit-base);
    animation-fill-mode:       both,                                    forwards;
  }

  /* 两角白色（最上层） */
  #两角白色 > [id="左上"] {
    animation-name:            converge-TL,                             converge-TL-out;
    animation-duration:        var(--dur-white),                        var(--dur-exit-white);
    animation-timing-function: linear,                                  linear;
    animation-delay:           var(--t0),                               var(--t-exit-base);
    animation-fill-mode:       both,                                    forwards;
  }
  #两角白色 > [id="右下"] {
    animation-name:            converge-BR,                             converge-BR-out;
    animation-duration:        var(--dur-white),                        var(--dur-exit-white);
    animation-timing-function: linear,                                  linear;
    animation-delay:           var(--t0),                               var(--t-exit-base);
    animation-fill-mode:       both,                                    forwards;
  }

  /* HOLD / SLIDE：入场 + 出场 */
  #HOLD > use {
    transform-box: fill-box;
    animation-name: slide-TR-to-BL, slide-TR-to-BL-out;
    animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1), cubic-bezier(0.55, 0, 1, 0.45);
    animation-fill-mode: both, forwards;
    animation-duration: var(--dur-bg), var(--dur-exit-bg);
    animation-delay: var(--t0), var(--t-exit-bg);
  }
  #Slide > use {
    transform-box: fill-box;
    animation-name: slide-BL-to-TR, slide-BL-to-TR-out;
    animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1), cubic-bezier(0.55, 0, 1, 0.45);
    animation-fill-mode: both, forwards;
    animation-duration: var(--dur-bg), var(--dur-exit-bg);
    animation-delay: var(--t0), var(--t-exit-bg);
  }
</style>
</head>
<body class="scroll-driven">
  <div class="scroll-hint" id="scroll-hint">
    向下滚动查看动画
    <span class="arrow"></span>
  </div>
  <div class="scroll-space" aria-hidden="true"></div>

  <!-- 第一页：滚动前 -->
  <div class="content-page" id="page-before">
    <div class="page-content">
      <p>不知道给自己的网站用什么转场？</p>
      <img src="sad.png" alt="sad">
      <p style="font-size:0.85rem;margin-top:0.5rem;opacity:0.7;">向下滚动，体验舞萌转场作为页面切换动画的实际效果 ✨</p>
    </div>
  </div>

  <!-- 转场舞台 -->
  <div class="stage" id="stage">
    <div class="frame" id="frame"></div>
  </div>

  <!-- 第二页：滚动后 -->
  <div class="content-page" id="page-after">
    <div class="page-content">
      <p>来试试给wmc量身定制的乌蒙转场！</p>
      <img src="happy.JPG" alt="happy">
      <p style="font-size:0.85rem;margin-top:0.5rem;opacity:0.7;">这个转场可以直接用在你自己的网站中，欢迎在你的项目里使用！</p>
    </div>
    <a class="project-link" href="https://github.com/gfdfdxc/maimai-transition" target="_blank" rel="noopener">⭐ 项目 GitHub：github.com/gfdfdxc/maimai-transition</a>
  </div>

<script>
  const frame = document.getElementById('frame');
  const stage = document.getElementById('stage');
  const pageBefore = document.getElementById('page-before');
  const pageAfter = document.getElementById('page-after');
  const contentBefore = pageBefore.querySelector('.page-content');
  const contentAfter = pageAfter.querySelector('.page-content');
  let animations = [];
  let totalDuration = 0;
  let rafId = null;

  /* 为每个 slide / hold 注入随机化的 duration / delay；同时覆盖入场+出场两段 */
  function jitterSlides(root) {
    const all = root.querySelectorAll('#HOLD > use, #Slide > use');
    all.forEach(el => {
      const durIn    = 0.55 + Math.random() * 0.25;
      const delayIn  = 0.17 + Math.random() * 0.06;
      const durOut   = 0.27 + Math.random() * 0.04;
      const delayOut = 1.746 + Math.random() * 0.02;
      el.style.animationDuration = `${durIn.toFixed(3)}s, ${durOut.toFixed(3)}s`;
      el.style.animationDelay    = `${delayIn.toFixed(3)}s, ${delayOut.toFixed(3)}s`;
    });
  }

  /* 入场期间把滴拉熊提到 SVG 末尾（绘制顺序最顶层） */
  function elevateChip(root) {
    const svg = root.querySelector('svg');
    if (!svg) return;
    const chip = svg.querySelector('#滴拉熊');
    if (chip) svg.appendChild(chip);
  }

  function collectAnimations() {
    const svg = frame.querySelector('svg');
    if (!svg) return;
    animations = svg.getAnimations({ subtree: true });
    totalDuration = 0;

    animations.forEach(anim => {
      anim.pause();
      const timing = anim.effect.getTiming();
      const duration = typeof timing.duration === 'number' ? timing.duration : 0;
      const iterations = typeof timing.iterations === 'number' ? timing.iterations : 1;
      const delay = typeof timing.delay === 'number' ? timing.delay : 0;
      const endDelay = typeof timing.endDelay === 'number' ? timing.endDelay : 0;
      const active = delay + duration * iterations + endDelay;
      if (active > totalDuration) totalDuration = active;
    });
  }

  function clamp01(value) {
    return Math.min(1, Math.max(0, value));
  }

  function getScrollY() {
    return window.scrollY || window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
  }

  /**
   * 滚动布局（5 屏 = 500vh）：
   *   0      ~ 100vh  → 第一页（page-before）
   *   100vh  ~ 300vh  → 转场动画（stage）
   *   300vh  ~ 500vh  → 第二页（page-after）
   *
   * 滚动进度 progress 0→1 映射整段 500vh：
   *   progress 0.0 ~ 0.2  → 第一页可见
   *   progress 0.2 ~ 0.6  → 转场动画
   *   progress 0.6 ~ 1.0  → 第二页可见
   */
  function updateTimeline() {
    const scrollRange = window.innerHeight * 4;   // 500vh - 100vh = 4 屏可滚距离
    const progress = clamp01(getScrollY() / scrollRange);

    /* --- 第一页内容渐隐（背景保持可见） --- */
    const beforeFadeStart = 0.12;
    const beforeFadeEnd   = 0.22;
    if (progress <= beforeFadeStart) {
      contentBefore.style.opacity = 1;
      pageBefore.style.opacity = 1;
    } else if (progress >= beforeFadeEnd) {
      contentBefore.style.opacity = 0;
      /* 第一页背景在转场后半段渐隐，与第二页背景交叉淡出 */
      const bgFadeStart = 0.38;
      const bgFadeEnd = 0.50;
      if (progress <= bgFadeStart) {
        pageBefore.style.opacity = 1;
      } else if (progress >= bgFadeEnd) {
        pageBefore.style.opacity = 0;
      } else {
        pageBefore.style.opacity = 1 - (progress - bgFadeStart) / (bgFadeEnd - bgFadeStart);
      }
    } else {
      contentBefore.style.opacity = 1 - (progress - beforeFadeStart) / (beforeFadeEnd - beforeFadeStart);
      pageBefore.style.opacity = 1;
    }

    /* --- 舞台可见性 --- */
    const stageStart = 0.18;
    const stageEnd   = 0.62;
    if (progress >= stageStart && progress <= stageEnd) {
      stage.classList.add('visible');
    } else {
      stage.classList.remove('visible');
    }

    /* --- 转场动画时间轴 --- */
    if (animations.length && totalDuration > 0) {
      const animProgress = clamp01((progress - stageStart) / (stageEnd - stageStart));
      const t = animProgress * totalDuration;
      animations.forEach(anim => {
        const timing = anim.effect.getTiming();
        const delay = typeof timing.delay === 'number' ? timing.delay : 0;
        const endDelay = typeof timing.endDelay === 'number' ? timing.endDelay : 0;
        const duration = typeof timing.duration === 'number' ? timing.duration : 0;
        const iterations = typeof timing.iterations === 'number' ? timing.iterations : 1;
        const activeEnd = delay + duration * iterations + endDelay;
        if (t < delay) {
          anim.currentTime = 0;
        } else if (t > activeEnd) {
          anim.currentTime = activeEnd;
        } else {
          anim.currentTime = t;
        }
      });
    }

    /* --- 第二页渐显（背景先显，内容后显） --- */
    const afterBgFadeStart = 0.38;
    const afterBgFadeEnd   = 0.50;
    const afterContentFadeStart = 0.56;
    const afterContentFadeEnd   = 0.66;
    if (progress <= afterBgFadeStart) {
      pageAfter.style.opacity = 0;
    } else if (progress >= afterBgFadeEnd) {
      pageAfter.style.opacity = 1;
    } else {
      pageAfter.style.opacity = (progress - afterBgFadeStart) / (afterBgFadeEnd - afterBgFadeStart);
    }
    if (progress <= afterContentFadeStart) {
      contentAfter.style.opacity = 0;
    } else if (progress >= afterContentFadeEnd) {
      contentAfter.style.opacity = 1;
    } else {
      contentAfter.style.opacity = (progress - afterContentFadeStart) / (afterContentFadeEnd - afterContentFadeStart);
    }
  }

  function requestUpdate() {
    if (rafId !== null) return;
    rafId = requestAnimationFrame(() => {
      rafId = null;
      updateTimeline();
    });
  }

  async function loadSVG() {
    const res = await fetch('舞萌转场复刻_16比9.svg');
    const text = await res.text();
    frame.innerHTML = text;
    elevateChip(frame);
    jitterSlides(frame);
    collectAnimations();
    updateTimeline();
  }

  function onScroll() {
    requestUpdate();
    /* 滚动后隐藏提示 */
    const hint = document.getElementById('scroll-hint');
    if (hint && getScrollY() > 30) hint.classList.add('hidden');
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  document.addEventListener('scroll', onScroll, { passive: true });
  document.body.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', updateTimeline);

  loadSVG();
</script>
</body>
</html>
